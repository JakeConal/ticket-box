name: Final Verification

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  final-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backend tests
        run: |
          docker run --rm \
            -v "$PWD/api:/workspace" \
            -w /workspace \
            gradle:9-jdk25-alpine \
            gradle --no-daemon --project-cache-dir /tmp/ticketbox-gradle-cache test

      - name: Frontend build
        run: docker build -f ticketbox-web/Dockerfile -t ticketbox-web-final-check .

      - name: Compose build
        run: docker compose build api web

      - name: Install OpenSpec
        run: npm install -g @fission-ai/openspec

      - name: OpenSpec validation
        run: openspec validate ticketbox-platform --strict

      - name: Start stack
        run: docker compose up -d postgres redis api web nginx

      - name: Wait for stack
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8088/api/health >/dev/null && curl -fsS http://localhost:8088/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps -a
          docker compose logs api --tail=160
          docker compose logs web --tail=120
          docker compose logs nginx --tail=80
          exit 1

      - name: Verify seed data
        run: sh scripts/verify-seed.sh

      - name: Smoke API through Nginx
        run: node scripts/final-smoke.mjs
