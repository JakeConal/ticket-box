spring:
  application:
    name: ticketbox-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticketbox}
    username: ${SPRING_DATASOURCE_USERNAME:ticketbox}
    password: ${SPRING_DATASOURCE_PASSWORD:ticketbox}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:2}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:false}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

ticketbox:
  auth:
    jwt-secret: ${AUTH_JWT_SECRET:change-me-auth-secret}
    access-token-ttl: ${AUTH_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${AUTH_REFRESH_TOKEN_TTL:7d}
  queue:
    jwt-secret: ${QUEUE_JWT_SECRET:change-me-queue-secret}
    enabled: ${QUEUE_ENABLED:true}
    admission-token-ttl: ${QUEUE_ADMISSION_TOKEN_TTL:3m}
    active-window-before: ${QUEUE_ACTIVE_WINDOW_BEFORE:5m}
    active-window-after: ${QUEUE_ACTIVE_WINDOW_AFTER:30m}
    admit-batch-size: ${QUEUE_ADMIT_BATCH_SIZE:10}
    admission-delay: ${QUEUE_ADMISSION_DELAY:1s}
    admission-initial-delay: ${QUEUE_ADMISSION_INITIAL_DELAY:1s}
    queue-ttl: ${QUEUE_TTL:2h}
  qr:
    key-id: ${QR_KEY_ID:local-dev}
    private-key-path: ${QR_PRIVATE_KEY_PATH:./keys/qr-private.pem}
    public-key-path: ${QR_PUBLIC_KEY_PATH:./keys/qr-public.pem}
  payments:
    vnpay:
      tmn-code: ${VNPAY_TMN_CODE:}
      hash-secret: ${VNPAY_HASH_SECRET:}
      pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      return-url: ${VNPAY_RETURN_URL:http://localhost:8088/api/payments/vnpay/callback}
      ipn-url: ${VNPAY_IPN_URL:http://localhost:8088/api/payments/vnpay/ipn}
    momo:
      partner-code: ${MOMO_PARTNER_CODE:}
      access-key: ${MOMO_ACCESS_KEY:}
      secret-key: ${MOMO_SECRET_KEY:}
      endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
      query-endpoint: ${MOMO_QUERY_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/query}
      return-url: ${MOMO_RETURN_URL:http://localhost:8088/api/payments/momo/callback}
      ipn-url: ${MOMO_IPN_URL:${MOMO_RETURN_URL:http://localhost:8088/api/payments/momo/callback}}
  ai:
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_MODEL:gemini-2.0-flash}
    gemini-request-timeout: ${GEMINI_REQUEST_TIMEOUT:30s}
    storage-dir: ${ARTIST_PDF_STORAGE_DIR:./storage/artist-pdfs}
    max-pdf-bytes: ${ARTIST_PDF_MAX_BYTES:20971520}
    max-pages: ${ARTIST_PDF_MAX_PAGES:20}
    max-extracted-chars: ${ARTIST_PDF_MAX_EXTRACTED_CHARS:40000}
    max-prompt-chars: ${ARTIST_BIO_MAX_PROMPT_CHARS:20000}
    min-extracted-chars: ${ARTIST_BIO_MIN_EXTRACTED_CHARS:50}
    extraction-timeout: ${ARTIST_PDF_EXTRACTION_TIMEOUT:10s}
    reaper-threshold: ${ARTIST_BIO_REAPER_THRESHOLD:5m}
    regeneration-min-interval: ${ARTIST_BIO_REGENERATION_MIN_INTERVAL:1m}
    reaper-delay-ms: ${ARTIST_BIO_REAPER_DELAY_MS:60000}
  imports:
    vip-dir: ${VIP_IMPORT_DIR:./imports/vip}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/ticketbox}
    username: ${SPRING_DATASOURCE_USERNAME:ticketbox}
    password: ${SPRING_DATASOURCE_PASSWORD:ticketbox}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: ${TEST_SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticketbox_test}
    username: ${TEST_SPRING_DATASOURCE_USERNAME:ticketbox}
    password: ${TEST_SPRING_DATASOURCE_PASSWORD:ticketbox}
  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:6379}
